<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Studio Tasks</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="page-enter" data-page="team-tasks">
  <main class="team-tasks-shell">
    <section class="home-header team-tasks-header reveal">
      <article class="home-brand-row">
        <button class="home-top-button pressable" type="button" aria-label="Open menu" data-menu-open>
          <img src="/Assets/burger menu icon.png" alt="Burger menu icon">
        </button>
        <img class="home-brand-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
        <button class="home-top-button pressable" type="button" aria-label="Change language">
          <img src="/Assets/language globe icon.png" alt="Globe icon">
        </button>
      </article>
    </section>

    <section class="team-tasks-subhead reveal">
      <button class="team-tasks-icon-btn pressable" type="button" aria-label="Back" data-nav-target="TeamDetails.html">
        <img src="/Assets/Arrow Left Icon (Onboarding).png" alt="Back icon">
      </button>
      <article class="team-tasks-subhead-center">
        <h1 class="team-tasks-page-title">ECHO STUDIO TASKS</h1>
        <p class="team-tasks-page-meta">10 total tasks</p>
      </article>
      <article class="team-tasks-subhead-actions">
        <button class="team-tasks-icon-btn pressable" type="button" aria-label="Search">
          <img src="/Assets/search Icon.png" alt="Search icon">
        </button>
        <button class="team-tasks-icon-btn pressable" type="button" aria-label="Filter">
          <img src="NO IMAGE HERE" alt="Filter icon">
        </button>
      </article>
    </section>

    <nav class="team-tasks-tabs reveal" aria-label="Task status filters">
      <button class="team-tasks-tab team-tasks-tab-active pressable" type="button" aria-current="true">
        <span>All</span>
        <span class="team-tasks-tab-count team-tasks-tab-count-dark">10</span>
      </button>
      <button class="team-tasks-tab pressable" type="button">
        <span>To Do</span>
        <span class="team-tasks-tab-count">3</span>
      </button>
      <button class="team-tasks-tab pressable" type="button">
        <span>In Progress</span>
        <span class="team-tasks-tab-count">3</span>
      </button>
      <button class="team-tasks-tab pressable" type="button">
        <span>Review</span>
        <span class="team-tasks-tab-count">2</span>
      </button>
    </nav>

    <section class="team-tasks-filters reveal" aria-label="Task filters">
      <button class="team-tasks-filter-pill pressable" type="button">
        <span>Priority</span>
        <span class="team-tasks-filter-chevron" aria-hidden="true">▾</span>
      </button>
      <button class="team-tasks-filter-pill pressable" type="button">
        <span>Assignee</span>
        <span class="team-tasks-filter-chevron" aria-hidden="true">▾</span>
      </button>
      <button class="team-tasks-filter-pill pressable" type="button">
        <span>Due Date</span>
        <span class="team-tasks-filter-chevron" aria-hidden="true">▾</span>
      </button>
    </section>

    <section class="team-tasks-board reveal">
      <article class="team-tasks-group team-tasks-group-open">
        <button class="team-tasks-group-toggle pressable" type="button" aria-expanded="true">
          <span class="team-tasks-status-swatch team-tasks-status-swatch-todo" aria-hidden="true"></span>
          <span class="team-tasks-group-title">To Do</span>
          <span class="team-tasks-group-badge">3</span>
          <span class="team-tasks-group-rule" aria-hidden="true"></span>
          <span class="team-tasks-group-chevron" aria-hidden="true">▾</span>
        </button>
        <section class="team-tasks-group-body">
          <article class="team-tasks-card team-tasks-card-priority-high pressable">
            <span class="team-tasks-card-accent" aria-hidden="true"></span>
            <article class="team-tasks-card-main">
              <p class="team-tasks-card-title">WRITE LYRICS FOR TRACK 3</p>
              <article class="team-tasks-card-meta">
                <span class="team-tasks-initials" aria-hidden="true">RS</span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/calendar Icon.png" alt="Calendar icon">
                  <span>Apr 20</span>
                </span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/marker icon.png" alt="Tag icon">
                  <span>Admin</span>
                </span>
              </article>
            </article>
            <span class="team-tasks-drag" aria-hidden="true"></span>
          </article>
          <article class="team-tasks-card team-tasks-card-priority-med pressable">
            <span class="team-tasks-card-accent" aria-hidden="true"></span>
            <article class="team-tasks-card-main">
              <p class="team-tasks-card-title">SECONDARY TASK</p>
              <article class="team-tasks-card-meta">
                <span class="team-tasks-initials" aria-hidden="true">JK</span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/calendar Icon.png" alt="Calendar icon">
                  <span>Apr 20</span>
                </span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/marker icon.png" alt="Tag icon">
                  <span>Admin</span>
                </span>
              </article>
            </article>
            <span class="team-tasks-drag" aria-hidden="true"></span>
          </article>
          <article class="team-tasks-card team-tasks-card-priority-low pressable">
            <span class="team-tasks-card-accent" aria-hidden="true"></span>
            <article class="team-tasks-card-main">
              <p class="team-tasks-card-title">ARRANGE SESSION</p>
              <article class="team-tasks-card-meta">
                <span class="team-tasks-initials" aria-hidden="true">AR</span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/calendar Icon.png" alt="Calendar icon">
                  <span>Apr 20</span>
                </span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/marker icon.png" alt="Tag icon">
                  <span>Admin</span>
                </span>
              </article>
            </article>
            <span class="team-tasks-drag" aria-hidden="true"></span>
          </article>
        </section>
      </article>

      <article class="team-tasks-group">
        <button class="team-tasks-group-toggle team-tasks-group-toggle-collapsed pressable" type="button" aria-expanded="false">
          <span class="team-tasks-status-swatch team-tasks-status-swatch-progress" aria-hidden="true"></span>
          <span class="team-tasks-group-title">In Progress</span>
          <span class="team-tasks-group-badge">3</span>
          <span class="team-tasks-group-rule" aria-hidden="true"></span>
          <span class="team-tasks-group-chevron" aria-hidden="true">›</span>
        </button>
      </article>

      <article class="team-tasks-group">
        <button class="team-tasks-group-toggle team-tasks-group-toggle-collapsed pressable" type="button" aria-expanded="false">
          <span class="team-tasks-status-swatch team-tasks-status-swatch-review" aria-hidden="true"></span>
          <span class="team-tasks-group-title">Review</span>
          <span class="team-tasks-group-badge">2</span>
          <span class="team-tasks-group-rule" aria-hidden="true"></span>
          <span class="team-tasks-group-chevron" aria-hidden="true">›</span>
        </button>
      </article>

      <article class="team-tasks-group team-tasks-group-open">
        <button class="team-tasks-group-toggle pressable" type="button" aria-expanded="true">
          <span class="team-tasks-status-swatch team-tasks-status-swatch-done" aria-hidden="true"></span>
          <span class="team-tasks-group-title">Done</span>
          <span class="team-tasks-group-badge">2</span>
          <span class="team-tasks-group-rule" aria-hidden="true"></span>
          <span class="team-tasks-group-chevron" aria-hidden="true">▾</span>
        </button>
        <section class="team-tasks-group-body">
          <article class="team-tasks-card team-tasks-card-priority-high pressable">
            <span class="team-tasks-card-accent" aria-hidden="true"></span>
            <article class="team-tasks-card-main">
              <p class="team-tasks-card-title">WRITE LYRICS FOR TRACK 3</p>
              <article class="team-tasks-card-meta">
                <span class="team-tasks-initials" aria-hidden="true">RS</span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/calendar Icon.png" alt="Calendar icon">
                  <span>Apr 20</span>
                </span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/marker icon.png" alt="Tag icon">
                  <span>Admin</span>
                </span>
                <span class="team-tasks-meta-pill team-tasks-meta-pill-progress">
                  <img src="NO IMAGE HERE" alt="Checkbox icon">
                  <span>5/5</span>
                </span>
              </article>
            </article>
            <span class="team-tasks-drag" aria-hidden="true"></span>
          </article>
          <article class="team-tasks-card team-tasks-card-priority-med pressable">
            <span class="team-tasks-card-accent" aria-hidden="true"></span>
            <article class="team-tasks-card-main">
              <p class="team-tasks-card-title">SECONDARY TASK</p>
              <article class="team-tasks-card-meta">
                <span class="team-tasks-initials" aria-hidden="true">JK</span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/calendar Icon.png" alt="Calendar icon">
                  <span>Apr 20</span>
                </span>
                <span class="team-tasks-meta-pill">
                  <img src="/Assets/marker icon.png" alt="Tag icon">
                  <span>Admin</span>
                </span>
                <span class="team-tasks-meta-pill team-tasks-meta-pill-progress">
                  <img src="NO IMAGE HERE" alt="Checkbox icon">
                  <span>5/5</span>
                </span>
              </article>
            </article>
            <span class="team-tasks-drag" aria-hidden="true"></span>
          </article>
        </section>
      </article>
    </section>

    <button class="team-tasks-fab pressable" type="button" aria-label="Add task">
      <span aria-hidden="true">+</span>
    </button>
  </main>

  <section class="home-nav-overlay" aria-label="Navigation menu">
    <video class="home-nav-video" autoplay muted loop playsinline>
      <source src="/Assets/Background Video.mp4" type="video/mp4">
    </video>
    <article class="home-nav-dark-layer"></article>
    <article class="home-nav-content">
      <img class="home-nav-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
      <nav class="home-nav-links" aria-label="Overlay links">
        <button class="home-nav-link pressable" type="button">PROFILE</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="CreeAI.html">CREE AI</button>
        <button class="home-nav-link pressable" type="button">FRIEND LINKS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button">NOTIFICATIONS</button>
        <button class="home-nav-link pressable" type="button">ADD PAGE</button>
        <button class="home-nav-link pressable" type="button">REPORTS</button>
      </nav>
      <button id="homeNavBack" class="home-nav-back pressable" type="button" aria-label="Close menu">
        <img src="/Assets/cancel icon.png" alt="Cancel icon">
      </button>
    </article>
    <footer class="home-nav-footer">
      <button class="home-nav-logout pressable" type="button">LOGOUT</button>
    </footer>
  </section>

  <script src="script.js"></script>
</body>
</html>
