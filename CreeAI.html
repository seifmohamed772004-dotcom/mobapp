<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CREE AI</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="page-enter" data-page="cree-ai">
  <main class="cree-shell">
    <section class="home-header cree-header reveal">
      <article class="home-brand-row">
        <button class="home-top-button pressable" type="button" aria-label="Open menu" data-cree-menu-open>
          <img src="/Assets/burger menu icon.png" alt="Burger menu icon">
        </button>
        <img class="home-brand-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
        <button class="home-top-button pressable" type="button" aria-label="Change language">
          <img src="/Assets/language globe icon.png" alt="Globe icon">
        </button>
      </article>
    </section>

    <section class="cree-chat-area">
      <section id="creeChatThread" class="cree-chat-thread">
        <article class="cree-bubble cree-bubble-ai">
          <p>Hello! I'm CREE AI, your creative assistant. How can I help you today?</p>
        </article>
      </section>
    </section>
  </main>

  <section class="cree-input-dock">
    <form id="creeChatForm" class="cree-input-form">
      <input id="creeChatInput" type="text" placeholder="Message CREE AI..." aria-label="Message CREE AI">
      <button class="cree-send-button pressable" type="submit" aria-label="Send message">
        <img src="/Assets/Share Icon.png" alt="Send icon">
      </button>
    </form>
  </section>

  <section id="creeSidebarBackdrop" class="cree-sidebar-backdrop"></section>
  <aside id="creeSidebar" class="cree-sidebar">
    <section id="creeSidebarMain" class="cree-sidebar-page is-active">
      <article class="cree-sidebar-head">
        <h2>Settings</h2>
        <button id="creeSidebarClose" class="cree-sidebar-close pressable" type="button" aria-label="Close sidebar">
          <img src="/Assets/cancel icon.png" alt="Cancel icon">
        </button>
      </article>

      <article class="cree-account-card">
        <article class="cree-account-top">
          <span class="profile-bubble" aria-label="User profile">U</span>
          <article>
            <h3>User Account</h3>
            <p>Free Plan</p>
          </article>
        </article>
        <button class="cree-account-manage pressable" type="button">Manage Account</button>
      </article>

      <button id="creeStartNewChat" class="cree-side-row cree-side-row-highlight pressable" type="button">
        <img src="/Assets/marker icon.png" alt="Create new chat icon">
        <span>Create New Chat</span>
      </button>
      <button id="creeOpenPrevChats" class="cree-side-row pressable" type="button">
        <img src="/Assets/clock icon.png" alt="Previous chats icon">
        <article><span>Previous Chats</span><p>View chat history</p></article>
      </button>
      <button class="cree-side-row pressable" type="button">
        <img src="/Assets/Alert Icon Nav.png" alt="Notifications icon">
        <article><span>Notifications</span><p>Manage your alerts</p></article>
      </button>
      <button class="cree-side-row pressable" type="button">
        <img src="/Assets/Cree Ai Nav.png" alt="Appearance icon">
        <article><span>Appearance</span><p>Theme and display</p></article>
      </button>
      <button class="cree-side-row pressable" type="button">
        <img src="/Assets/Home Icon Nav.png" alt="Privacy and security icon">
        <article><span>Privacy &amp; Security</span><p>Data and permissions</p></article>
      </button>
      <button class="cree-side-row cree-side-row-danger pressable" type="button">
        <img src="/Assets/Like Icon.png" alt="Clear chat history icon">
        <article><span>Clear Chat History</span><p>Delete all messages</p></article>
      </button>

      <p class="cree-sidebar-version">CREE AI V1.0.0</p>
    </section>

    <section id="creeSidebarPrev" class="cree-sidebar-page">
      <article class="cree-sidebar-head">
        <h2>Previous Chats</h2>
        <button id="creePrevCancel" class="cree-sidebar-close pressable" type="button" aria-label="Back to settings sidebar">
          <img src="/Assets/cancel icon.png" alt="Cancel icon">
        </button>
      </article>

      <article class="cree-prev-list">
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>Design System Questions</h3><p>Can you help me with...</p><span>2 hours ago</span></article>
        </button>
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>Career Advice</h3><p>What should I focus on...</p><span>1 day ago</span></article>
        </button>
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>Portfolio Review</h3><p>I need feedback on my...</p><span>3 days ago</span></article>
        </button>
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>UI Components Help</h3><p>How do I create a...</p><span>5 days ago</span></article>
        </button>
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>Color Theory Discussion</h3><p>Tell me about color...</p><span>1 week ago</span></article>
        </button>
        <button class="cree-prev-card pressable" type="button">
          <img src="/Assets/Comments Icon.png" alt="Chat icon">
          <article><h3>Typography Best Practice</h3><p>What are the best...</p><span>2 weeks ago</span></article>
        </button>
      </article>

      <button id="creeStartNewChatPrev" class="cree-start-chat-btn pressable" type="button">Start New Chat</button>
    </section>

    <footer class="cree-sidebar-footer">
      <button id="creeBackToStudio" class="cree-back-studio pressable" type="button">BACK TO CREESTUDIOS</button>
    </footer>
  </aside>

  <nav class="app-bottom-nav-shell" aria-label="Primary navigation">
    <section class="app-bottom-nav">
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Home" data-nav-target="Home.html">
        <img src="/Assets/Home Icon Nav.png" alt="Home icon">
        <span>Home</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="My Jobs" data-nav-target="Home.html">
        <img src="/Assets/Work Icon Nav.png" alt="My jobs icon">
        <span>My Jobs</span>
      </button>
      <button class="app-bottom-nav-item app-bottom-nav-item-active pressable" type="button" aria-label="CREE AI" data-nav-target="CreeAI.html">
        <img src="/Assets/Cree Ai Nav.png" alt="Cree AI icon">
        <span>CREE AI</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Alerts" data-nav-target="Alerts.html">
        <img src="/Assets/Alert Icon Nav.png" alt="Alerts icon">
        <span>Alerts</span>
      </button>
    </section>
  </nav>

  <script src="script.js"></script>
</body>
</html>
