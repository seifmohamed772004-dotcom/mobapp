<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alex Rivera</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="page-enter" data-page="member-profile">
  <main class="member-profile-shell">
    <section class="home-header reveal member-profile-brand">
      <article class="home-brand-row">
        <button class="home-top-button pressable" type="button" aria-label="Open menu" data-menu-open>
          <img src="/Assets/burger menu icon.png" alt="Burger menu icon">
        </button>
        <img class="home-brand-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
        <button class="home-top-button pressable" type="button" aria-label="Change language">
          <img src="/Assets/language globe icon.png" alt="Globe icon">
        </button>
      </article>
    </section>

    <section class="member-profile-subnav reveal">
      <button class="member-profile-back pressable" type="button" aria-label="Back to team details" data-nav-target="TeamDetails.html">
        <img src="/Assets/Arrow Left Icon (Onboarding).png" alt="Back icon">
      </button>
    </section>

    <section class="member-profile-hero reveal">
      <article class="member-profile-photo-wrap">
        <img class="member-profile-photo" src="/Assets/post 1.png" alt="Alex Rivera profile photo">
        <button class="member-profile-edit pressable" type="button" aria-label="Edit profile photo">
          <span aria-hidden="true">✎</span>
        </button>
      </article>
      <h1 class="member-profile-name">Alex Rivera</h1>
      <p class="member-profile-role">Singer</p>
      <article class="member-profile-status pressable">
        <span class="member-profile-status-dot"></span>
        <p>Open for work</p>
      </article>
      <article class="member-profile-rating">
        <article class="member-profile-stars" aria-label="Rating 4 out of 5">
          <span class="member-profile-star">★</span>
          <span class="member-profile-star">★</span>
          <span class="member-profile-star">★</span>
          <span class="member-profile-star">★</span>
          <span class="member-profile-star member-profile-star-empty">☆</span>
        </article>
        <p class="member-profile-rating-value">4.0</p>
      </article>
      <button class="member-profile-gallery pressable" type="button">VIEW GALLERY</button>
      <article class="member-profile-actions-row">
        <button class="member-profile-action member-profile-action-primary pressable" type="button">
          <svg class="member-profile-action-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#FFEEDC" d="M12 2l2.2 5.5L20 8.5l-4.5 3.5 1.4 6L12 15.5 6.1 18l1.4-6L3 8.5l5.8-1L12 2z"/>
          </svg>
          <span>Achievements</span>
        </button>
        <button class="member-profile-action member-profile-action-secondary pressable" type="button">
          <span class="member-profile-dash-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span>Dashboard</span>
        </button>
      </article>
    </section>

    <article class="member-profile-separator" aria-hidden="true"></article>

    <section class="member-profile-posts reveal">
      <article class="member-profile-post-card pressable">
        <img src="/Assets/post 1.png" alt="Gallery post image">
      </article>
      <article class="member-profile-post-card pressable">
        <img src="/Assets/post 2.png" alt="Gallery post image">
      </article>
      <article class="member-profile-post-card pressable">
        <img src="/Assets/post 1.png" alt="Gallery post image">
      </article>
      <article class="member-profile-post-card pressable">
        <img src="/Assets/post 2.png" alt="Gallery post image">
      </article>
      <article class="member-profile-post-card pressable">
        <img src="/Assets/post 1.png" alt="Gallery post image">
      </article>
    </section>
  </main>

  <nav class="app-bottom-nav-shell" aria-label="Primary navigation">
    <section class="app-bottom-nav">
      <button class="app-bottom-nav-item app-bottom-nav-item-active pressable" type="button" aria-label="Home" data-nav-target="Home.html">
        <img src="/Assets/Home Icon Nav.png" alt="Home icon">
        <span>Home</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Groups" data-nav-target="Teams.html">
        <img src="/Assets/attendees Icon.png" alt="Groups icon">
        <span>Groups</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Jobs" data-nav-target="Teams.html">
        <img src="/Assets/briefcase Icon.png" alt="Jobs icon">
        <span>Jobs</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Alerts" data-nav-target="Alerts.html">
        <img src="/Assets/Alert Icon Nav.png" alt="Alerts icon">
        <span>Alerts</span>
      </button>
    </section>
  </nav>

  <section class="home-nav-overlay" aria-label="Navigation menu">
    <video class="home-nav-video" autoplay muted loop playsinline>
      <source src="/Assets/Background Video.mp4" type="video/mp4">
    </video>
    <article class="home-nav-dark-layer"></article>
    <article class="home-nav-content">
      <img class="home-nav-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
      <nav class="home-nav-links" aria-label="Overlay links">
        <button class="home-nav-link pressable" type="button">PROFILE</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="CreeAI.html">CREE AI</button>
        <button class="home-nav-link pressable" type="button">FRIEND LINKS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button">NOTIFICATIONS</button>
        <button class="home-nav-link pressable" type="button">ADD PAGE</button>
        <button class="home-nav-link pressable" type="button">REPORTS</button>
      </nav>
      <button id="homeNavBack" class="home-nav-back pressable" type="button" aria-label="Close menu">
        <img src="/Assets/cancel icon.png" alt="Cancel icon">
      </button>
    </article>
    <footer class="home-nav-footer">
      <button class="home-nav-logout pressable" type="button">LOGOUT</button>
    </footer>
  </section>

  <script src="script.js"></script>
</body>
</html>
