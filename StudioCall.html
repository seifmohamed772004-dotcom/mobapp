<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Studio</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="page-enter" data-page="studio-call">
  <main class="studio-call-shell">
    <section class="home-header reveal studio-call-brand">
      <article class="home-brand-row">
        <button class="home-top-button pressable" type="button" aria-label="Open menu" data-menu-open>
          <img src="/Assets/burger menu icon.png" alt="Burger menu icon">
        </button>
        <img class="home-brand-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
        <button class="home-top-button pressable" type="button" aria-label="Change language">
          <img src="/Assets/language globe icon.png" alt="Globe icon">
        </button>
      </article>
    </section>

    <section class="studio-call-subhead reveal">
      <button class="studio-call-subhead-icon pressable" type="button" aria-label="Back" data-nav-target="TeamDetails.html">
        <img src="/Assets/Arrow Left Icon (Onboarding).png" alt="Back icon">
      </button>
      <article class="studio-call-subhead-center">
        <h1 class="studio-call-title">ECHO STUDIO</h1>
        <p class="studio-call-timer">02:34</p>
      </article>
      <button class="studio-call-menu pressable" type="button" aria-label="More options">
        <span aria-hidden="true">⋮</span>
      </button>
    </section>

    <section class="studio-participants reveal">
      <article class="studio-participant-card pressable studio-participant-card--you">
        <button class="studio-participant-mic studio-participant-mic-on pressable" type="button" aria-label="Microphone on">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">YOU</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--ar">
        <button class="studio-participant-mic studio-participant-mic-off pressable" type="button" aria-label="Microphone muted">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#D63A3A" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 4l16 16" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">AR</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--fc">
        <button class="studio-participant-mic studio-participant-mic-on pressable" type="button" aria-label="Microphone on">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">FC</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--hb">
        <button class="studio-participant-mic studio-participant-mic-on pressable" type="button" aria-label="Microphone on">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">HB</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--rs">
        <button class="studio-participant-mic studio-participant-mic-off pressable" type="button" aria-label="Microphone muted">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#D63A3A" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 4l16 16" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">RS</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--qw">
        <button class="studio-participant-mic studio-participant-mic-on pressable" type="button" aria-label="Microphone on">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">QW</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--jk">
        <button class="studio-participant-mic studio-participant-mic-on pressable" type="button" aria-label="Microphone on">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">JK</span>
      </article>
      <article class="studio-participant-card pressable studio-participant-card--wr">
        <button class="studio-participant-mic studio-participant-mic-off pressable" type="button" aria-label="Microphone muted">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#D63A3A" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 4l16 16" stroke="#D63A3A" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="studio-participant-avatar">WR</span>
      </article>
    </section>
  </main>

  <section class="studio-call-controls" aria-label="Call controls">
    <button class="studio-control-btn pressable" type="button" aria-label="Microphone">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
        <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v4M8 22h8" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="studio-control-btn pressable" type="button" aria-label="Camera">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 10l4-3v10l-4-3H5a2 2 0 01-2-2V8a2 2 0 012-2h10z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="studio-control-btn studio-control-sparkle pressable" type="button" aria-label="Studio effects">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2l1.5 5.5L19 12l-5.5 4.5L12 22l-1.5-5.5L5 12l5.5-4.5L12 2z" fill="#FFEEDC"/>
      </svg>
    </button>
    <button class="studio-control-btn pressable" type="button" aria-label="Speaker">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M11 5L6 9H3v6h3l5 4V5z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
        <path d="M16 9a4 4 0 010 6M18 7a7 7 0 010 10" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="studio-control-btn studio-control-end pressable" type="button" aria-label="End call">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7 3h10v10H7V3z" stroke="#FFEEDC" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 13v3c0 1.5 1.5 3 3 3s3-1.5 3-3v-3" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
        <path d="M5 21h14" stroke="#FFEEDC" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </section>

  <nav class="app-bottom-nav-shell" aria-label="Primary navigation">
    <section class="app-bottom-nav">
      <button class="app-bottom-nav-item app-bottom-nav-item-active pressable" type="button" aria-label="Home" data-nav-target="Home.html">
        <img src="/Assets/Home Icon Nav.png" alt="Home icon">
        <span>Home</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="My Jobs" data-nav-target="Teams.html">
        <img src="/Assets/Work Icon Nav.png" alt="My jobs icon">
        <span>My Jobs</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="CREE AI" data-nav-target="CreeAI.html">
        <img src="/Assets/Cree Ai Nav.png" alt="Cree AI icon">
        <span>CREE AI</span>
      </button>
      <button class="app-bottom-nav-item pressable" type="button" aria-label="Alerts" data-nav-target="Alerts.html">
        <img src="/Assets/Alert Icon Nav.png" alt="Alerts icon">
        <span>Alerts</span>
      </button>
    </section>
  </nav>

  <section class="home-nav-overlay" aria-label="Navigation menu">
    <video class="home-nav-video" autoplay muted loop playsinline>
      <source src="/Assets/Background Video.mp4" type="video/mp4">
    </video>
    <article class="home-nav-dark-layer"></article>
    <article class="home-nav-content">
      <img class="home-nav-logo" src="/Assets/Login Logo.png" alt="Creestudios logo">
      <nav class="home-nav-links" aria-label="Overlay links">
        <button class="home-nav-link pressable" type="button">PROFILE</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="CreeAI.html">CREE AI</button>
        <button class="home-nav-link pressable" type="button">FRIEND LINKS</button>
        <button class="home-nav-link pressable" type="button" data-nav-target="Settings.html">SETTINGS</button>
        <button class="home-nav-link pressable" type="button">NOTIFICATIONS</button>
        <button class="home-nav-link pressable" type="button">ADD PAGE</button>
        <button class="home-nav-link pressable" type="button">REPORTS</button>
      </nav>
      <button id="homeNavBack" class="home-nav-back pressable" type="button" aria-label="Close menu">
        <img src="/Assets/cancel icon.png" alt="Cancel icon">
      </button>
    </article>
    <footer class="home-nav-footer">
      <button class="home-nav-logout pressable" type="button">LOGOUT</button>
    </footer>
  </section>

  <script src="script.js"></script>
</body>
</html>
